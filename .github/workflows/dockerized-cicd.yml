name: CI Build Pipeline

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest .
          docker tag ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest ${{ secrets.DOCKER_USERNAME }}/cicd-demo:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/cicd-demo:${{ github.sha }}

  deploy:
    runs-on: self-hosted
    needs: build   # runs after build job

    steps:
      - name: Pull Docker image
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/cicd-demo:${{ github.sha }}

      - name: Stop old container
        run: |
          docker stop cicd-demo || true
          docker rm cicd-demo || true

      - name: Run new container
        run: |
          docker run -d \
            -p 3000:80 \
            --name cicd-demo \
            --restart unless-stopped \
            ${{ secrets.DOCKER_USERNAME }}/cicd-demo:${{ github.sha }}

      - name: Debug (optional but useful)
        run: |
          docker ps -a
          docker images
