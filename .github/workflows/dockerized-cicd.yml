name: CI Build Pipeline

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      # 🚨 FIX: Disable broken npm cache completely
      - name: Setup Node (NO CACHE)
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: ''   # disables cache

      - name: Clean environment (important for macOS runner)
        run: |
          rm -rf node_modules
          rm -rf ~/.npm
          rm -rf ~/.cache

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest .
          docker tag ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest ${{ secrets.DOCKER_USERNAME }}/cicd-demo:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/cicd-demo:${{ github.sha }}

  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Deploy container (STRICT - no silent failure)
        run: |
          set -e

          echo "Pulling image..."
          docker pull ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest

          echo "Stopping old container..."
          docker stop cicd-demo || true
          docker rm cicd-demo || true

          echo "Running new container..."
          docker run -d \
            -p 3000:80 \
            --name cicd-demo \
            --restart unless-stopped \
            ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest

          echo "=== VERIFY CONTAINER ==="
          docker ps -a

      # 🔥 HARD DEBUG (leave this for now)
      - name: Docker sanity test
        run: |
          echo "Running hello-world test"
          docker run hello-world
          docker ps -a
