name: CI Build Pipeline

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Clean workspace (fix tar/cache issues)
        run: |
          rm -rf node_modules
          rm -rf ~/.npm
          rm -rf ~/.cache

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest .
          docker tag ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest ${{ secrets.DOCKER_USERNAME }}/cicd-demo:${{ github.sha }}

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/cicd-demo:${{ github.sha }}

  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Pull Docker image
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/cicd-demo:${{ github.sha }} || docker pull ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest

      - name: Stop old container
        run: |
          docker stop cicd-demo || true
          docker rm cicd-demo || true

      - name: Run new container
        run: |
          docker run -d \
            -p 3000:80 \
            --name cicd-demo \
            --restart unless-stopped \
            ${{ secrets.DOCKER_USERNAME }}/cicd-demo:${{ github.sha }} || \
          docker run -d \
            -p 3000:80 \
            --name cicd-demo \
            --restart unless-stopped \
            ${{ secrets.DOCKER_USERNAME }}/cicd-demo:latest

      - name: Debug
        run: |
          echo "=== Containers ==="
          docker ps -a
          echo "=== Images ==="
          docker images
